<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">

<body>
	<h2 style="text-align:center;">Size Chart</h2>

<table>
    <thead>
        <tr>
            <th>Size</th>

            <th>Waist (inches)</th>
            <th>Hip (inches)</th>
            <th>Length (inches)</th>

    </thead>
    <tbody>
        <tr>
            <td>S</td>
            <td>34-36</td>
            <td>28-30</td>
            <td>35-37</td>
            <td>27</td>
        </tr>
        <tr>
            <td>M</td>
            <td>38-40</td>
            <td>32-34</td>
            <td>39-41</td>
            <td>28</td>
        </tr>
        <tr>
            <td>L</td>
            <td>42-44</td>
            <td>36-38</td>
            <td>43-45</td>
            <td>29</td>
        </tr>
        <tr>
            <td>XL</td>
            <td>46-48</td>
            <td>40-42</td>
            <td>47-49</td>
            <td>30</td>
        </tr>
    </tbody>
</table>


</body>

</html>
